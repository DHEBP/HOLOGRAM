name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: OS dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential libgtk-3-dev libayatana-appindicator3-dev

      - name: Build
        shell: bash
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TELA-Browser-${{ runner.os }}
          path: build/bin/**

  # Signing / Notarization placeholders
  sign-macos:
    needs: build-matrix
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - name: Placeholder - Notarize & Staple
        run: echo "Notarization step placeholder. Configure APPLE_ID, APP_SPECIFIC_PW, TEAM_ID, CERTS in secrets."

  sign-windows:
    needs: build-matrix
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - name: Placeholder - Sign Executable
        run: echo "Windows signing placeholder. Configure code-signing cert and signtool in secrets."


