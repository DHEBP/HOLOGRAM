name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.1) — creates a draft release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-22.04
            wails_platform: linux/amd64
            archive_ext: tar.gz
          - platform: windows-amd64
            runner: windows-latest
            wails_platform: windows/amd64
            archive_ext: zip
          - platform: darwin-universal
            runner: macos-latest
            wails_platform: darwin/universal
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux UI dependencies
        if: matrix.platform == 'linux-amd64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (version=$VERSION, sha=$SHORT_SHA)"

      - name: Build HOLOGRAM (Wails)
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          BUILD_DATE: ${{ steps.version.outputs.build_date }}
        run: |
          LDFLAGS="-X main.AppVersion=${VERSION} -X main.BuildDate=${BUILD_DATE} -X main.GitCommit=${SHORT_SHA}"
          wails build -platform ${{ matrix.wails_platform }} -ldflags "$LDFLAGS" -clean -trimpath

      - name: Package artifact (Linux)
        if: matrix.platform == 'linux-amd64'
        shell: bash
        run: |
          cd build/bin
          chmod +x Hologram
          tar -czf "Hologram-v${{ steps.version.outputs.version }}-linux-amd64.tar.gz" Hologram
          sha256sum "Hologram-v${{ steps.version.outputs.version }}-linux-amd64.tar.gz" > "Hologram-v${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256"
          ls -la

      - name: Package artifact (Windows)
        if: matrix.platform == 'windows-amd64'
        shell: pwsh
        run: |
          cd build/bin
          $archive = "Hologram-v${{ steps.version.outputs.version }}-windows-amd64.zip"
          Compress-Archive -Path "Hologram.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii
          Get-ChildItem

      - name: Package artifact (macOS)
        if: matrix.platform == 'darwin-universal'
        shell: bash
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent "Hologram.app" "Hologram-v${{ steps.version.outputs.version }}-macos-universal.zip"
          shasum -a 256 "Hologram-v${{ steps.version.outputs.version }}-macos-universal.zip" > "Hologram-v${{ steps.version.outputs.version }}-macos-universal.zip.sha256"
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hologram-${{ matrix.platform }}
          path: |
            build/bin/Hologram-v*.tar.gz
            build/bin/Hologram-v*.zip
            build/bin/Hologram-v*.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract the section between "## [VERSION]" and the next "## ["
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          echo "Release notes extracted:"
          cat release_notes.md

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: HOLOGRAM ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            dist/Hologram-v*.tar.gz
            dist/Hologram-v*.zip
            dist/Hologram-v*.sha256
